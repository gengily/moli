<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>moli.rip</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.22);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.38);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 4rem;
      position: relative;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── custom cursor ── */
    #cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%,-50%);
      mix-blend-mode: difference;
    }
    #cursor-ring {
      position: fixed;
      width: 32px; height: 32px;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%,-50%);
      transition: width 0.25s cubic-bezier(0.16,1,0.3,1), height 0.25s cubic-bezier(0.16,1,0.3,1), border-color 0.25s;
      mix-blend-mode: difference;
    }
    body.hovering #cursor-ring { width: 48px; height: 48px; border-color: rgba(255,255,255,0.8); }

    /* ── grid ── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
      animation: gridPulse 8s ease-in-out infinite;
    }
    @keyframes gridPulse { 0%,100%{opacity:1} 50%{opacity:0.55} }

    #spotlight {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(circle 300px at 50% 50%, rgba(255,255,255,0.04) 0%, transparent 70%);
    }

    .orb {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0; filter: blur(90px);
    }
    .orb-1 { width:500px;height:500px;top:-150px;left:-120px;background:radial-gradient(circle,rgba(255,255,255,0.045) 0%,transparent 70%);animation:drift1 16s ease-in-out infinite; }
    .orb-2 { width:360px;height:360px;bottom:-100px;right:-80px;background:radial-gradient(circle,rgba(255,255,255,0.03) 0%,transparent 70%);animation:drift2 20s ease-in-out infinite; }
    @keyframes drift1 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(50px,30px) scale(1.05)} 66%{transform:translate(20px,60px) scale(0.95)} }
    @keyframes drift2 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-40px,-30px) scale(1.08)} 66%{transform:translate(-10px,-60px) scale(0.97)} }

    .bg-grain {
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      opacity:0.35;
    }

    /* ── container ── */
    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 390px;
      display: flex; flex-direction: column; align-items: center;
      animation: containerIn 1s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes containerIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    /* ── avatar ── */
    .avatar-wrap {
      margin-bottom: 1.3rem;
      animation: fadeDown 0.8s cubic-bezier(0.16,1,0.3,1) both;
      position: relative; cursor: none;
    }
    .avatar-wrap::before {
      content:'';position:absolute;inset:-5px;border-radius:50%;
      border:1px solid rgba(255,255,255,0.0);
      transition:border-color 0.4s,inset 0.4s cubic-bezier(0.16,1,0.3,1),box-shadow 0.4s;
    }
    .avatar-wrap:hover::before { inset:-8px;border-color:rgba(255,255,255,0.22);box-shadow:0 0 30px rgba(255,255,255,0.06); }
    .avatar-wrap::after {
      content:'';position:absolute;inset:-14px;border-radius:50%;
      border:1px solid rgba(255,255,255,0.0);
      transition:border-color 0.5s 0.05s,inset 0.5s cubic-bezier(0.16,1,0.3,1);
    }
    .avatar-wrap:hover::after { inset:-18px;border-color:rgba(255,255,255,0.08); }
    .avatar {
      width:86px;height:86px;border-radius:50%;object-fit:cover;
      border:1px solid rgba(255,255,255,0.12);
      box-shadow:0 0 0 4px rgba(255,255,255,0.03),0 8px 32px rgba(0,0,0,0.6);
      display:block;filter:grayscale(100%) contrast(1.05);
      transition:transform 0.4s cubic-bezier(0.16,1,0.3,1),box-shadow 0.4s,filter 0.4s;
    }
    .avatar-wrap:hover .avatar {
      transform:scale(1.06);
      box-shadow:0 0 0 4px rgba(255,255,255,0.09),0 16px 48px rgba(0,0,0,0.8);
      filter:grayscale(100%) contrast(1.15) brightness(1.1);
    }

    /* ── animated name ── */
    .header {
      text-align:center;margin-bottom:0.4rem;
      animation:fadeDown 0.85s cubic-bezier(0.16,1,0.3,1) 0.07s both;
    }

    .name {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(2rem,8vw,2.6rem);
      font-weight:300;letter-spacing:-0.02em;line-height:1;
      color:#ffffff;
      display:inline-flex;gap:0.02em;
      transition:letter-spacing 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    .name:hover { letter-spacing:0.08em; }

    .name-char {
      display:inline-block;
      animation:charFloat 3s ease-in-out infinite;
      transition:color 0.3s, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .name-char:hover { transform:translateY(-3px) scale(1.06) !important; color:#ffffff; }

    /* stagger float per char */
    .name-char:nth-child(1){animation-delay:0s}
    .name-char:nth-child(2){animation-delay:0.15s}
    .name-char:nth-child(3){animation-delay:0.3s;font-style:italic;color:rgba(255,255,255,0.5);}
    .name-char:nth-child(4){animation-delay:0.45s;font-style:italic;color:rgba(255,255,255,0.5);}

    @keyframes charFloat {
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-3px)}
    }

    .handle {
      font-size:0.63rem;font-weight:300;color:var(--muted);
      letter-spacing:0.15em;text-transform:uppercase;margin-top:0.35rem;
      transition:color 0.3s,letter-spacing 0.4s;
    }
    .handle:hover { color:rgba(255,255,255,0.65);letter-spacing:0.22em; }

    .bio {
      font-family:'Cormorant Garamond',serif;
      font-size:1rem;font-style:italic;font-weight:300;
      color:rgba(255,255,255,0.3);
      text-align:center;line-height:1.65;
      margin:1rem 0 1.7rem;max-width:260px;
      animation:fadeDown 0.9s cubic-bezier(0.16,1,0.3,1) 0.12s both;
      transition:color 0.3s;
    }
    .bio:hover { color:rgba(255,255,255,0.55); }

    .divider {
      width:28px;height:1px;background:rgba(255,255,255,0.12);
      margin:0 auto 1.7rem;
      animation:fadeIn 1s ease 0.18s both;
      transition:width 0.5s cubic-bezier(0.16,1,0.3,1),opacity 0.3s;
    }
    .divider:hover { width:80px;opacity:0.4; }

    /* ── links ── */
    .links { width:62%;display:flex;flex-direction:column;gap:0.45rem; }

    .link-item {
      display:flex;align-items:center;gap:0.45rem;
      padding:0.35rem 0.6rem;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:8px;
      text-decoration:none;color:var(--text);
      position:relative;overflow:hidden;
      box-shadow:0 1px 6px rgba(0,0,0,0.4);
      cursor:none;
      transform:perspective(600px) rotateX(0deg) rotateY(0deg) translateY(0px);
      transition:border-color 0.25s,box-shadow 0.25s,transform 0.2s cubic-bezier(0.16,1,0.3,1),background 0.25s;
    }

    /* shimmer sweep */
    .link-item::before {
      content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
      background:linear-gradient(105deg,transparent,rgba(255,255,255,0.05),transparent);
      transition:left 0.5s ease;pointer-events:none;z-index:1;
    }
    .link-item:hover::before { left:160%; }

    /* glare layer — moves with mouse via JS */
    .link-glare {
      position:absolute;inset:0;border-radius:10px;pointer-events:none;
      background:radial-gradient(circle 120px at 50% 50%, rgba(255,255,255,0.08) 0%, transparent 70%);
      opacity:0;
      transition:opacity 0.6s ease, background 0.35s ease;
      z-index:2;
    }
    .link-item:hover .link-glare { opacity:1; }

    /* inset glow border */
    .link-item::after {
      content:'';position:absolute;inset:0;border-radius:10px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,0);
      transition:box-shadow 0.3s;pointer-events:none;
    }
    .link-item:hover::after { box-shadow:inset 0 0 0 1px rgba(255,255,255,0.1); }

    .link-item:hover {
      border-color:var(--border-hover);
      background:var(--surface2);
      box-shadow:0 12px 40px rgba(0,0,0,0.7),0 2px 8px rgba(0,0,0,0.4);
    }
    .link-item:active { transform:perspective(600px) rotateX(0deg) rotateY(0deg) translateY(1px) scale(0.99) !important;transition:transform 0.07s !important; }

    .link-icon {
      width:20px;height:20px;border-radius:5px;
      background:rgba(255,255,255,0.05);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
      transition:background 0.25s,border-color 0.25s,transform 0.3s cubic-bezier(0.16,1,0.3,1);
      position:relative;z-index:3;
    }
    .link-item:hover .link-icon { background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.16);transform:scale(1.1) rotate(-4deg); }

    .link-text { flex:1;position:relative;z-index:3; }
    .link-label {
      font-size:0.58rem;font-weight:400;letter-spacing:0.01em;
      color:rgba(255,255,255,0.85);
      transition:color 0.25s,letter-spacing 0.3s;
    }
    .link-item:hover .link-label { color:#ffffff;letter-spacing:0.03em; }
    .link-sub { font-size:0.48rem;color:var(--muted);margin-top:0.05rem;letter-spacing:0.04em;transition:color 0.25s; }
    .link-item:hover .link-sub { color:rgba(255,255,255,0.55); }

    .link-arrow {
      color:rgba(255,255,255,0.14);font-size:0.65rem;display:inline-block;
      transition:color 0.25s,transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      position:relative;z-index:3;
    }
    .link-item:hover .link-arrow { color:rgba(255,255,255,0.8);transform:translateX(5px); }

    .link-item:nth-child(1){animation:fadeUp 0.65s cubic-bezier(0.16,1,0.3,1) 0.22s both}
    .link-item:nth-child(2){animation:fadeUp 0.65s cubic-bezier(0.16,1,0.3,1) 0.31s both}
    .link-item:nth-child(3){animation:fadeUp 0.65s cubic-bezier(0.16,1,0.3,1) 0.40s both}
    .link-item:nth-child(4){animation:fadeUp 0.65s cubic-bezier(0.16,1,0.3,1) 0.49s both}

    /* ── visitor counter ── */
    .visitor-count {
      margin-top: 1.6rem;
      font-size: 0.5rem; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.18);
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
      transition: color 0.3s;
      animation: fadeIn 1.2s ease 0.6s both;
    }
    .visitor-count:hover { color: rgba(255,255,255,0.42); }
    #visitor-num { color: rgba(255,255,255,0.35); }

    /* ── bio tooltip ── */
    .bio { position: relative; }
    .bio-tip {
      position: absolute; bottom: calc(100% + 10px); left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: rgba(18,18,18,0.97);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 0.7rem 0.9rem;
      width: max-content; max-width: 230px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 100;
    }
    .bio:hover .bio-tip {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .bio-tip::after {
      content: '';
      position: absolute; top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: rgba(255,255,255,0.1);
    }
    .tip-line {
      display: flex; align-items: flex-start; gap: 0.55rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.48rem; letter-spacing: 0.06em;
      color: rgba(255,255,255,0.45);
      line-height: 1.6;
      font-style: normal;
    }
    .tip-line + .tip-line { margin-top: 0.3rem; }
    .tip-num {
      color: rgba(255,255,255,0.2);
      flex-shrink: 0;
      font-size: 0.4rem;
      margin-top: 0.05rem;
    }
    .tip-line b { color: rgba(255,255,255,0.75); font-weight: 400; }
    .tip-section {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.38rem; letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.22);
      font-style: normal;
      margin-bottom: 0.35rem;
    }
    .tip-divider {
      display: block;
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 0.6rem 0;
    }

    /* ── keyframes ── */
    @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(20px)}  to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
  </style>
</head>

  <div id="cursor-ring"></div>
  <div class="bg-grid"></div>
  <div id="spotlight"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="bg-grain"></div>

        gx += (tgx - gx) * 0.06;

        card.style.transform = `perspective(600px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) translateY(-3px)`;

      function resizeNoise(){
        noiseEl.width  = window.innerWidth;
        noiseEl.height = window.innerHeight;

      resizeNoise();
      window.addEventListener('resize', resizeNoise);

      let noiseRAF = null;
      function drawNoise(){
        const ctx = noiseEl.getContext('2d');
        const w = noiseEl.width, h = noiseEl.height;
        const img = ctx.createImageData(w, h);
        const d   = img.data;
        for(let i=0;i<d.length;i+=4){
          const v = Math.random()*255|0;
          d[i]=v; d[i+1]=v; d[i+2]=v; d[i+3]=255;
        }
        ctx.putImageData(img,0,0);
        noiseRAF = requestAnimationFrame(drawNoise);

      /* ── VHS static audio burst ── */
      function playVHSBurst() {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const dur = 1.2;
          const bufSize = ctx.sampleRate * dur;
          const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
          const data = buf.getChannelData(0);
          for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);

          const src = ctx.createBufferSource();
          src.buffer = buf;

          // bandpass + distortion to make it feel like tape
          const bp1 = ctx.createBiquadFilter();
          bp1.type = 'bandpass'; bp1.frequency.value = 1200; bp1.Q.value = 0.4;

          const bp2 = ctx.createBiquadFilter();
          bp2.type = 'highpass'; bp2.frequency.value = 300;

          const wave = ctx.createWaveShaper();
          const curve = new Float32Array(256);
          for (let i = 0; i < 256; i++) {
            const x = (i * 2) / 256 - 1;
            curve[i] = (Math.PI + 80) * x / (Math.PI + 80 * Math.abs(x));
          }
          wave.curve = curve;

          const gain = ctx.createGain();
          gain.gain.setValueAtTime(0, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.35, ctx.currentTime + 0.04);
          gain.gain.setValueAtTime(0.35, ctx.currentTime + 0.7);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);

          // occasional loud crackle spikes
          const crackleGain = ctx.createGain();
          crackleGain.gain.setValueAtTime(1, ctx.currentTime);

          src.connect(bp1); bp1.connect(bp2); bp2.connect(wave);
          wave.connect(gain); gain.connect(crackleGain);
          crackleGain.connect(ctx.destination);
          src.start();
          src.stop(ctx.currentTime + dur);
          setTimeout(() => ctx.close(), (dur + 0.2) * 1000);
        } catch(e) {}
      }

      function triggerGlitch(){

      `;
      document.head.appendChild(s);

      // resize canvas
      function resize() { cvEl.width = innerWidth; cvEl.height = innerHeight; }
      resize();
      window.addEventListener('resize', resize);

      // update clock
      function updateTime() {
        const n = new Date();
        const h = String(n.getHours()).padStart(2,'0');
        const m = String(n.getMinutes()).padStart(2,'0');
        timeEl.textContent = h + ':' + m;
      }
      updateTime();
      setInterval(updateTime, 1000);

      let ssRAF = null;
      let active = false;
      let t = 0;
      const AURORA = [
        { phase: 0,    spd: 0.00018, amp: 0.09, yf: 0.28, width: 0.55 },
        { phase: 2.1,  spd: 0.00013, amp: 0.07, yf: 0.50, width: 0.45 },
        { phase: 4.7,  spd: 0.00022, amp: 0.06, yf: 0.72, width: 0.40 },
        { phase: 1.3,  spd: 0.00016, amp: 0.05, yf: 0.38, width: 0.30 },
      ];


      function drawSS(ts) {
        if (!active) return;
        t = ts * 0.001;
        const ctx = cvEl.getContext('2d');
        const W = cvEl.width, H = cvEl.height;

        // deep fade trail (phosphor persistence)
        ctx.fillStyle = 'rgba(0,0,0,0.045)';
        ctx.fillRect(0, 0, W, H);

        // ── aurora bands ──
        AURORA.forEach((a, i) => {
          const y0 = H * a.yf;
          const grad = ctx.createRadialGradient(W/2, y0, 0, W/2, y0, W * a.width);
          const base = 0.028 + i * 0.006;
          grad.addColorStop(0,   `rgba(255,255,255,${base + 0.018 * Math.sin(t * a.spd * 8000 + a.phase)})`);
          grad.addColorStop(0.4, `rgba(255,255,255,${base * 0.4})`);
          grad.addColorStop(1,   'rgba(255,255,255,0)');

          ctx.save();
          ctx.globalCompositeOperation = 'screen';
          const drift = Math.sin(t * a.spd * 6000 + a.phase) * H * a.amp;
          ctx.translate(0, drift);
          ctx.fillStyle = grad;
          ctx.fillRect(0, y0 - H * 0.35, W, H * 0.7);
          ctx.restore();
        });

        // ── horizontal grain streaks ──
        if (Math.random() < 0.04) {
          const sy = Math.random() * H;
          const sh = Math.random() * 1.5 + 0.5;
          ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.04})`;
          ctx.fillRect(0, sy, W * (0.3 + Math.random() * 0.7), sh);
        }

        // ── scanlines ──
        ctx.fillStyle = 'rgba(0,0,0,0.10)';
        for (let y = 0; y < H; y += 4) ctx.fillRect(0, y, W, 2);

        // ── vignette ──
        const vig = ctx.createRadialGradient(W/2,H/2,H*0.2, W/2,H/2,H*0.85);
        vig.addColorStop(0, 'rgba(0,0,0,0)');
        vig.addColorStop(1, 'rgba(0,0,0,0.72)');
        ctx.fillStyle = vig;
        ctx.fillRect(0, 0, W, H);

        ssRAF = requestAnimationFrame(drawSS);
      }

      let idleTimer = null;

      function resetIdle() {
        clearTimeout(idleTimer);
        if (active) wakeUp();
        idleTimer = setTimeout(sleep, IDLE_MS);
      }

      function sleep() {
        active = true;
        t = 0;
        document.body.classList.add('idle-fading');
        ovEl.classList.add('visible');
        ssRAF = requestAnimationFrame(drawSS);
      }

      function wakeUp() {
        if (!active) return;
        active = false;
        ovEl.classList.remove('visible');
        document.body.classList.remove('idle-fading');
        if (ssRAF) { cancelAnimationFrame(ssRAF); ssRAF = null; }
        const ctx = cvEl.getContext('2d');
        setTimeout(() => ctx.clearRect(0, 0, cvEl.width, cvEl.height), 2500);
      }

      ['mousemove','mousedown','keydown','touchstart','scroll'].forEach(ev => {
        document.addEventListener(ev, resetIdle, { passive: true });
      });

      resetIdle();
    })();

  </script>
</body>
</html>
